<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 462" font-family="Helvetica Neue, Arial, sans-serif">
  <rect x="0" y="0" width="540" height="462" fill="#ffffff"/>

  <!-- y-axis -->
  <line x1="95" y1="50" x2="95" y2="350" stroke="#9aa3ab" stroke-width="0.9"/>
  <g font-size="12.5" fill="#6b757e">
    <line x1="90" y1="350" x2="95" y2="350" stroke="#9aa3ab" stroke-width="0.9"/>
