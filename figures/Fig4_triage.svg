  <rect x="209.5" y="133.7" width="56" height="216.3" fill="#0d7d7d"/>
  <text x="237.5" y="126" font-size="16" font-weight="700" fill="#0d7d7d" text-anchor="middle">0.72</text>

  <rect x="304.5" y="169.4" width="56" height="180.6" fill="#5b6b7a"/>
  <text x="332.5" y="161.6" font-size="16" font-weight="700" fill="#5b6b7a" text-anchor="middle">0.60</text>

  <rect x="399.5" y="185.6" width="56" height="164.4" fill="#9aa3ab"/>
