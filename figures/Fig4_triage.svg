  <!-- bars: centers 142.5 / 237.5 / 332.5 / 427.5, width 56, baseline 350 -->
  <rect x="114.5" y="75.8" width="56" height="274.2" fill="#dbe2e6" stroke="#9aa3ab" stroke-width="0.9"/>
