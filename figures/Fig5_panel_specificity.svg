<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 690" font-family="Helvetica Neue, Arial, sans-serif">
  <rect x="0" y="0" width="660" height="690" fill="#ffffff"/>

  <!-- legend (top) -->
  <circle cx="372" cy="34" r="6" fill="#0d7d7d"/>
  <text x="384" y="39" font-size="13" fill="#1a1a1a">ERNIE-RNA</text>
  <circle cx="486" cy="34" r="5.5" fill="#9aa3ab"/>
  <text x="497" y="39" font-size="13" fill="#1a1a1a">RNA-FM</text>

  <!-- highlight band behind U4-type rows -->
  <rect x="200" y="85" width="400" height="54" fill="#eef5f5"/>

  <!-- chance line at AUC 0.5 (x=400) -->
  <line x1="400" y1="58" x2="400" y2="620" stroke="#9aa3ab" stroke-width="0.9" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="400" y="52" font-size="11.5" fill="#9aa3ab" text-anchor="middle">chance</text>

  <!-- x-axis -->
  <line x1="200" y1="620" x2="600" y2="620" stroke="#9aa3ab" stroke-width="0.9"/>
  <g font-size="12" fill="#6b757e" text-anchor="middle">
    <line x1="200" y1="620" x2="200" y2="625" stroke="#9aa3ab" stroke-width="0.9"/><text x="200" y="640">0.2</text>
    <line x1="333.3" y1="620" x2="333.3" y2="625" stroke="#9aa3ab" stroke-width="0.9"/><text x="333.3" y="640">0.4</text>
    <line x1="400" y1="620" x2="400" y2="625" stroke="#9aa3ab" stroke-width="0.9"/><text x="400" y="640">0.5</text>
    <line x1="466.7" y1="620" x2="466.7" y2="625" stroke="#9aa3ab" stroke-width="0.9"/><text x="466.7" y="640">0.6</text>
    <line x1="600" y1="620" x2="600" y2="625" stroke="#9aa3ab" stroke-width="0.9"/><text x="600" y="640">0.8</text>
  </g>
  <text x="400" y="660" font-size="13.5" fill="#1a1a1a" text-anchor="middle">AUC, localizing ClinVar-pathogenic positions</text>

  <!-- group headers -->
  <g font-size="12.5" font-weight="700" fill="#6b757e">
    <text x="24" y="74">U4-type snRNAs</text>
    <text x="24" y="162">Other nuclear ncRNAs</text>
    <text x="24" y="302">Mitochondrial tRNAs</text>
  </g>

  <!-- ===== rows: connector, RNA-FM dot, ERNIE dot, gene label ===== -->
  <!-- U4-type -->
  <g>
    <line x1="420" y1="98" x2="523.3" y2="98" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="420" cy="98" r="5.5" fill="#9aa3ab"/><circle cx="523.3" cy="98" r="6" fill="#0d7d7d"/>
    <text x="24" y="103" font-size="13" font-weight="700" fill="#0d7d7d">RNU4-2</text>
    <line x1="435.3" y1="124" x2="497.3" y2="124" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="435.3" cy="124" r="5.5" fill="#9aa3ab"/><circle cx="497.3" cy="124" r="6" fill="#0d7d7d"/>
    <text x="24" y="129" font-size="13" font-weight="700" fill="#0d7d7d">RNU4ATAC</text>
  </g>
  <!-- other nuclear -->
  <g>
    <line x1="408" y1="186" x2="481.3" y2="186" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="408" cy="186" r="5.5" fill="#9aa3ab"/><circle cx="481.3" cy="186" r="6" fill="#0d7d7d"/>
    <text x="24" y="191" font-size="13" fill="#1a1a1a">SNORD118</text>
    <line x1="372.7" y1="212" x2="467.3" y2="212" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="372.7" cy="212" r="5.5" fill="#9aa3ab"/><circle cx="467.3" cy="212" r="6" fill="#0d7d7d"/>
    <text x="24" y="217" font-size="13" fill="#1a1a1a">RNU12</text>
    <line x1="360" y1="238" x2="421.3" y2="238" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="360" cy="238" r="5.5" fill="#9aa3ab"/><circle cx="421.3" cy="238" r="6" fill="#0d7d7d"/>
    <text x="24" y="243" font-size="13" fill="#1a1a1a">RMRP</text>
    <line x1="419.3" y1="264" x2="457.3" y2="264" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="457.3" cy="264" r="5.5" fill="#9aa3ab"/><circle cx="419.3" cy="264" r="6" fill="#0d7d7d"/>
    <text x="24" y="269" font-size="13" fill="#1a1a1a">TERC</text>
  </g>
  <!-- mito tRNAs -->
  <g>
    <line x1="438" y1="326" x2="516" y2="326" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="438" cy="326" r="5.5" fill="#9aa3ab"/><circle cx="516" cy="326" r="6" fill="#0d7d7d"/>
    <text x="24" y="331" font-size="13" fill="#1a1a1a">MT-TL2</text>
    <line x1="480" y1="352" x2="506" y2="352" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="480" cy="352" r="5.5" fill="#9aa3ab"/><circle cx="506" cy="352" r="6" fill="#0d7d7d"/>
    <text x="24" y="357" font-size="13" fill="#1a1a1a">MT-TI</text>
    <line x1="363.3" y1="378" x2="496.7" y2="378" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="363.3" cy="378" r="5.5" fill="#9aa3ab"/><circle cx="496.7" cy="378" r="6" fill="#0d7d7d"/>
    <text x="24" y="383" font-size="13" fill="#1a1a1a">MT-TV</text>
    <line x1="470" y1="404" x2="496" y2="404" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="496" cy="404" r="5.5" fill="#9aa3ab"/><circle cx="470" cy="404" r="6" fill="#0d7d7d"/>
    <text x="24" y="409" font-size="13" fill="#1a1a1a">MT-TF</text>
    <line x1="456.7" y1="430" x2="496" y2="430" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="496" cy="430" r="5.5" fill="#9aa3ab"/><circle cx="456.7" cy="430" r="6" fill="#0d7d7d"/>
    <text x="24" y="435" font-size="13" fill="#1a1a1a">MT-TR</text>
    <line x1="456" y1="456" x2="539.3" y2="456" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="539.3" cy="456" r="5.5" fill="#9aa3ab"/><circle cx="456" cy="456" r="6" fill="#0d7d7d"/>
    <text x="24" y="461" font-size="13" fill="#1a1a1a">MT-TW</text>
    <line x1="409.3" y1="482" x2="437.3" y2="482" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="409.3" cy="482" r="5.5" fill="#9aa3ab"/><circle cx="437.3" cy="482" r="6" fill="#0d7d7d"/>
    <text x="24" y="487" font-size="13" fill="#1a1a1a">MT-TK</text>
    <line x1="434" y1="508" x2="500" y2="508" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="500" cy="508" r="5.5" fill="#9aa3ab"/><circle cx="434" cy="508" r="6" fill="#0d7d7d"/>
    <text x="24" y="513" font-size="13" fill="#1a1a1a">MT-TH</text>
    <line x1="402.7" y1="534" x2="415.3" y2="534" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="402.7" cy="534" r="5.5" fill="#9aa3ab"/><circle cx="415.3" cy="534" r="6" fill="#0d7d7d"/>
    <text x="24" y="539" font-size="13" fill="#1a1a1a">MT-TG</text>
    <line x1="408.7" y1="560" x2="478" y2="560" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="478" cy="560" r="5.5" fill="#9aa3ab"/><circle cx="408.7" cy="560" r="6" fill="#0d7d7d"/>
    <text x="24" y="565" font-size="13" fill="#1a1a1a">MT-TT</text>
    <line x1="378.7" y1="586" x2="400.7" y2="586" stroke="#d0d5da" stroke-width="2.4"/>
    <circle cx="378.7" cy="586" r="5.5" fill="#9aa3ab"/><circle cx="400.7" cy="586" r="6" fill="#0d7d7d"/>
    <text x="24" y="591" font-size="13" fill="#1a1a1a">MT-TL1</text>
  </g>

  <text x="200" y="680" font-size="11.5" fill="#9aa3ab">median ERNIE-RNA 0.59 vs RNA-FM 0.55 · one-sided sign test p = 0.17</text>
</svg>
